name: Bump Homebrew tap formula
description: >-
  Update version, url, and sha256 of a Homebrew formula in a tap repository
  via the GitHub Contents API. Designed for fine-grained PATs scoped to the
  tap repo only.
author: DaveDev42

branding:
  icon: package
  color: orange

inputs:
  formula-name:
    description: Name of the formula (e.g. "macstate"). Used as default for formula-path.
    required: true
  version:
    description: New version string. Accepts "0.1.2" or "v0.1.2".
    required: true
  download-url:
    description: URL of the release tarball; sha256 is computed by downloading it.
    required: true
  formula-path:
    description: Path of the formula file inside the tap repo.
    required: false
    default: ""
  tap-repo:
    description: GitHub repository "owner/name" of the Homebrew tap.
    required: false
    default: DaveDev42/homebrew-tap
  tap-branch:
    description: Branch in the tap repo to commit to.
    required: false
    default: main
  commit-message:
    description: Commit message. Supports {name} and {version} placeholders.
    required: false
    default: "{name} {version}"

runs:
  using: composite
  steps:
    - name: Bump formula
      shell: bash
      env:
        FORMULA_NAME: ${{ inputs.formula-name }}
        FORMULA_PATH: ${{ inputs.formula-path }}
        VERSION_INPUT: ${{ inputs.version }}
        DOWNLOAD_URL: ${{ inputs.download-url }}
        TAP_REPO: ${{ inputs.tap-repo }}
        TAP_BRANCH: ${{ inputs.tap-branch }}
        COMMIT_MSG_TEMPLATE: ${{ inputs.commit-message }}
      run: |
        set -euo pipefail

        : "${TAP_TOKEN:?TAP_TOKEN env var is required (fine-grained PAT with Contents:Write on the tap repo)}"

        version="${VERSION_INPUT#v}"
        formula_path="${FORMULA_PATH:-Formula/${FORMULA_NAME}.rb}"
        commit_message="${COMMIT_MSG_TEMPLATE//\{name\}/${FORMULA_NAME}}"
        commit_message="${commit_message//\{version\}/${version}}"
        api="https://api.github.com"
        contents_url="${api}/repos/${TAP_REPO}/contents/${formula_path}"

        # Mask the token in any inadvertent log output and surface a token
        # fingerprint to make 401s easier to diagnose without leaking secrets.
        echo "::add-mask::${TAP_TOKEN}"
        token_len="${#TAP_TOKEN}"
        token_prefix="${TAP_TOKEN:0:4}"
        token_tail_hash="$(printf '%s' "$TAP_TOKEN" | shasum -a 256 | cut -c1-8)"
        echo "TAP_TOKEN: len=${token_len} prefix=${token_prefix}*** sha256-prefix=${token_tail_hash}"

        echo "::group::Compute sha256 of ${DOWNLOAD_URL}"
        tarball="$(mktemp)"
        curl -fsSL "$DOWNLOAD_URL" -o "$tarball"
        sha256="$(shasum -a 256 "$tarball" | awk '{print $1}')"
        rm -f "$tarball"
        echo "sha256=${sha256}"
        echo "::endgroup::"

        echo "::group::GET ${contents_url}?ref=${TAP_BRANCH}"
        meta_headers="$(mktemp)"
        meta_body="$(mktemp)"
        http_code="$(curl -sS -o "$meta_body" -D "$meta_headers" -w '%{http_code}' \
          -H "Authorization: Bearer ${TAP_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          -H "User-Agent: DaveDev42-homebrew-tap-release" \
          "${contents_url}?ref=${TAP_BRANCH}")"
        echo "HTTP ${http_code}"
        # Surface response headers minus any auth-y bits.
        grep -iE '^(x-ratelimit|x-github|x-accepted|content-type|status)' "$meta_headers" || true
        if [ "$http_code" != "200" ]; then
          echo "Response body:"
          cat "$meta_body"
          exit 1
        fi
        blob_sha="$(jq -r .sha "$meta_body")"
        current="$(jq -r .content "$meta_body" | base64 -d)"
        echo "blob_sha=${blob_sha}"
        echo "::endgroup::"

        echo "::group::Rewrite version, url, sha256"
        updated="$(printf '%s' "$current" | awk \
          -v ver="$version" -v url="$DOWNLOAD_URL" -v sha="$sha256" '
          {
            if      ($0 ~ /^[[:space:]]*version[[:space:]]+"/)  { sub(/"[^"]*"/, "\"" ver "\"") }
            else if ($0 ~ /^[[:space:]]*url[[:space:]]+"/)      { sub(/"[^"]*"/, "\"" url "\"") }
            else if ($0 ~ /^[[:space:]]*sha256[[:space:]]+"/)   { sub(/"[^"]*"/, "\"" sha "\"") }
            print
          }')"
        echo "::endgroup::"

        if [ "$current" = "$updated" ]; then
          echo "Formula already up to date; nothing to commit."
          exit 0
        fi

        echo "::group::PUT ${contents_url}"
        encoded="$(printf '%s' "$updated" | base64 | tr -d '\n')"
        put_body="$(jq -n \
          --arg msg "$commit_message" \
          --arg content "$encoded" \
          --arg sha "$blob_sha" \
          --arg branch "$TAP_BRANCH" \
          '{message:$msg, content:$content, sha:$sha, branch:$branch}')"
        put_headers="$(mktemp)"
        put_resp="$(mktemp)"
        http_code="$(curl -sS -o "$put_resp" -D "$put_headers" -w '%{http_code}' \
          -X PUT \
          -H "Authorization: Bearer ${TAP_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          -H "User-Agent: DaveDev42-homebrew-tap-release" \
          -H "Content-Type: application/json" \
          --data "$put_body" \
          "$contents_url")"
        echo "HTTP ${http_code}"
        if [ "$http_code" != "200" ] && [ "$http_code" != "201" ]; then
          echo "Response body:"
          cat "$put_resp"
          exit 1
        fi
        echo "Pushed ${FORMULA_NAME} ${version} to ${TAP_REPO}."
        echo "::endgroup::"
